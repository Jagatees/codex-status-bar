name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test
        run: node --test tests/*.test.js
      - name: Build DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./build.sh --dmg
          shasum -a 256 build/CodexStatusBar.dmg > build/CodexStatusBar.dmg.sha256
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/CodexStatusBar.dmg
            build/CodexStatusBar.dmg.sha256
