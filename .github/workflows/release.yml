name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Test
        run: node --test tests/*.test.js
      - name: Build DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./build.sh --dmg
          shasum -a 256 build/CodexStatusBar.dmg > build/CodexStatusBar.dmg.sha256
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/CodexStatusBar.dmg \
            build/CodexStatusBar.dmg.sha256 \
            --generate-notes \
            --title "Codex Status Bar ${GITHUB_REF_NAME#v}"
